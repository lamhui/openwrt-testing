name: Build ImmortalWrt for K2P

on:
  workflow_dispatch:
    inputs:
      enable_ssh:
        description: 'Enable SSH debugging connection (for make menuconfig)'
        required: false
        default: false
        type: boolean
  # schedule:
  #   - cron: '0 20 * * 0'

env:
  REPO_URL: https://github.com/immortalwrt/immortalwrt
  REPO_BRANCH: openwrt-24.10
  CONFIG_FILE: .config
  DIY_PART1: diy-part1.sh
  DIY_PART2: diy-part2.sh
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialization environment
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gettext git libelf-dev libncurses5-dev libssl-dev \
            python3 python3-distutils python3-pyelftools python3-setuptools \
            rsync swig unzip zlib1g-dev file wget
          mkdir -p $HOME/openwrt

      - name: Clone source code
        run: |
          git clone --depth=1 --branch ${{ env.REPO_BRANCH }} ${{ env.REPO_URL }} $HOME/openwrt

      - name: Load custom feeds (diy-part1)
        run: |
          chmod +x ${{ env.DIY_PART1 }}
          ${{ env.DIY_PART1 }} $HOME/openwrt

      - name: Update feeds
        run: |
          cd $HOME/openwrt
          ./scripts/feeds update -a

      - name: Load custom config (diy-part2)
        run: |
          chmod +x ${{ env.DIY_PART2 }}
          ${{ env.DIY_PART2 }} $HOME/openwrt

      - name: Install feeds
        run: |
          cd $HOME/openwrt
          ./scripts/feeds install -a

      - name: Copy config file
        run: |
          cp ${{ env.CONFIG_FILE }} $HOME/openwrt/.config

      - name: Generate full config
        run: |
          cd $HOME/openwrt
          make defconfig

      # ---- 新增 SSH 调试步骤（在编译前启动，可手动执行 make menuconfig） ----
      - name: Setup SSH (Pre-build menuconfig)
        if: github.event.inputs.enable_ssh == 'true'
        uses: mxschmitt/action-tmate@v3
        with:
          limit-access-to-actor: true

      - name: Build firmware
        run: |
          cd $HOME/openwrt
          make -j$(nproc) || make -j4 V=s

      # ---- 步骤11：收集并上传固件（修正路径和缩进） ----
      - name: Collect firmware files
        run: |
          cd $HOME/openwrt
          mkdir -p ${{ github.workspace }}/artifacts
          find bin -name "*.bin" -type f -exec cp {} ${{ github.workspace }}/artifacts/ \;
          
          if [ -z "$(ls -A ${{ github.workspace }}/artifacts)" ]; then
            echo "❌ 错误：没有找到任何 .bin 文件，编译可能失败！"
            exit 1
          else
            echo "✅ 找到以下固件文件："
            ls -lh ${{ github.workspace }}/artifacts/
          fi

      - name: Generate date variable
        run: |
          echo "BUILD_DATE=$(date +%Y%m%d)" >> $GITHUB_ENV

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: K2P-ImmortalWrt-${{ env.BUILD_DATE }}
          path: artifacts/*.bin
          retention-days: 30
